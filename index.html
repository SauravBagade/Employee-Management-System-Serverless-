<!DOCTYPE html>
<html>
<head>
    <title>Employee Management System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            margin: 5px 2px;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #007bff;
            color: white;
        }

        #msg {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Employee Management System</h2>

    <input type="text" id="employeeId" placeholder="Employee ID">
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="department" placeholder="Department">
    <input type="text" id="salary" placeholder="Salary">

    <button onclick="saveEmployee()">Save</button>
    <button onclick="updateEmployee()">Update</button>
    <button onclick="deleteEmployee()">Delete</button>
    <button onclick="getEmployees()">Load Employees</button>

    <p id="msg"></p>

    <table id="table">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>
    </table>

</div>

<script src="scripts.js"></script>

</body>
</html>
