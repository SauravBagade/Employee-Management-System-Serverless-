<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- ✅ Fix encoding issue -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <!-- ✅ Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Employee Management System</h2>

        <!-- Inputs -->
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="employeeId" class="form-control" placeholder="Employee ID">
            </div>
            <div class="col-md-6">
                <input type="text" id="name" class="form-control" placeholder="Name">
            </div>
            <div class="col-md-6">
                <input type="text" id="department" class="form-control" placeholder="Department">
            </div>
            <div class="col-md-6">
                <input type="text" id="salary" class="form-control" placeholder="Salary">
            </div>
        </div>

        <!-- Buttons -->
        <div class="text-center mt-4">
            <button class="btn btn-success me-2" onclick="saveEmployee()">Save</button>
            <button class="btn btn-warning me-2" onclick="updateEmployee()">Update</button>
            <button class="btn btn-danger me-2" onclick="deleteEmployee()">Delete</button>
            <button class="btn btn-primary" onclick="getEmployees()">Load Employees</button>
        </div>

        <!-- Message -->
        <p id="msg" class="text-center mt-3 fw-bold text-success"></p>
    </div>

    <!-- Table -->
    <div class="card shadow mt-4 p-3">
        <h4 class="text-center">Employee List</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-striped mt-3" id="table">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Salary</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Script -->
<script src="scripts.js"></script>

</body>
</html>
